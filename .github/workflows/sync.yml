name: Sync to Personal Repo
on:
  push:
    branches:
      - main
jobs:
  git-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Personal Mirror Repo
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git remote add mirror https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/baohg170524/my-react-app-mirror.git
          git push --force mirror main